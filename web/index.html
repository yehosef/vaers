<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAERS Analytics Dashboard</title>
    <meta name="description" content="Interactive dashboard for VAERS (Vaccine Adverse Event Reporting System) data analysis">
    <style>
      /* Reset and basic styling */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.4;
        color: #333;
        background-color: #f8f9fa;
      }
      
      /* Loading spinner */
      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }
      
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #007bff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        color: #666;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading VAERS Dashboard...</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
